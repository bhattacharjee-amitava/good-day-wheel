    transform-style: preserve-3d;
    /* Layered shadows for floating depth */
    box-shadow:

      0 4px 8px rgba(0,0,0,0.15),
      0 8px 16px rgba(0,0,0,0.2),

    transition: opacity 0.8s;

  .quote-card::after {
    content: '';

    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);

// ── VIBGYOR Wheel Drawing ──
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, cx = W/2, cy = H/2, R = W/2 - 10;

const VIBGYOR = [
  '#9400D3', '#4B0082', '#0000FF', '#00FF00',
  '#FFFF00', '#FF7F00', '#FF0000',
];
const VIBGYOR_BRIGHT = [
  '#BF5FFF', '#7B68EE', '#5599FF', '#50FF50',
  '#FFE940', '#FFA040', '#FF4545',
];

let rotation = 0;

function drawWheel(rot) {
  ctx.clearRect(0, 0, W, H);
  const sliceAngle = (2 * Math.PI) / VIBGYOR.length;
  VIBGYOR.forEach((color, i) => {
    const start = rot + i * sliceAngle;
    const end = start + sliceAngle;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, start, end);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
  ctx.beginPath();
  ctx.arc(cx, cy, R * 0.32, 0, 2 * Math.PI);
  ctx.fillStyle = '#0d0d1a';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  ctx.stroke();
}
drawWheel(0);

let idleAnim = null;
function idleSpin() {
  rotation += 0.004;
  drawWheel(rotation);
  idleAnim = requestAnimationFrame(idleSpin);
}

// Get 21 events for today: use historyDB if available, else pick from worldEvents
function getEventsForToday() {
  const key = getTodayKey();
  if (historyDB[key]) return historyDB[key];
  // Seed from day-of-year for deterministic shuffle
  const d = new Date();
  const start = new Date(d.getFullYear(), 0, 0);
  const doy = Math.floor((d - start) / 86400000);
  // Simple seeded shuffle
  const pool = worldEvents.slice();
  let seed = doy * 2654435761;
  for (let i = pool.length - 1; i > 0; i--) {
    seed = (seed * 1664525 + 1013904223) & 0x7fffffff;
    const j = seed % (i + 1);
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, 21);
}

const todayEvents = getEventsForToday();

// ── Detect which color slice was pressed ──
function getColorIndex(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width * W - cx;
  const y = (clientY - rect.top) / rect.height * H - cy;
  const dist = Math.sqrt(x * x + y * y);
  if (dist < R * 0.32) return -1;
  let angle = Math.atan2(y, x) - rotation;
  const sliceAngle = (2 * Math.PI) / VIBGYOR.length;
  angle = ((angle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(angle / sliceAngle);
}

// ── Duration-based Press Detection ──
const MAX_DURATION = 4000;
let pressStart = 0;
let pressTimer = null;
let pressing = false;
let spinAnim = null;
let pressedColorIdx = 0;

const container = document.getElementById('wheelContainer');
const durWrap = document.getElementById('durWrap');
const durBar = document.getElementById('durBar');
const hint = document.getElementById('hint');

function onPressStart(e) {
  if (pressing) return;
  pressing = true;
  pressStart = Date.now();
  durWrap.classList.add('active');
  durBar.style.width = '0%';

  let px, py;
  if (e.touches && e.touches[0]) {
    px = e.touches[0].clientX; py = e.touches[0].clientY;
  } else {
    px = e.clientX; py = e.clientY;
  }
  pressedColorIdx = getColorIndex(px, py);
  if (pressedColorIdx < 0) pressedColorIdx = Math.floor(Math.random() * 7);

  durBar.style.background = VIBGYOR_BRIGHT[pressedColorIdx];
  hint.textContent = 'Keep holding... ' + colorNames[pressedColorIdx] + '!';

  pressTimer = setInterval(() => {
    const elapsed = Date.now() - pressStart;
    const pct = Math.min(elapsed / MAX_DURATION, 1) * 100;
    durBar.style.width = pct + '%';
    if (pct >= 100) onPressEnd();
  }, 40);
}

function onPressEnd() {
  if (!pressing) return;
  pressing = false;
  clearInterval(pressTimer);
  durWrap.classList.remove('active');

  const elapsed = Date.now() - pressStart;
  if (elapsed < 200) {
    hint.textContent = 'Press & hold any color on the wheel!';
    return;
  }

  const durLevel = elapsed < 1000 ? 0 : elapsed < 2500 ? 1 : 2;
  const normalizedDur = Math.min(elapsed / MAX_DURATION, 1);
  triggerSpin(pressedColorIdx, durLevel, normalizedDur);
}

function triggerSpin(colorIdx, durLevel, normalizedDur) {
  hint.textContent = '';
  cancelAnimationFrame(idleAnim);
  if (spinAnim) cancelAnimationFrame(spinAnim);

  const spinDuration = 1500 + normalizedDur * 1500;
  const totalRotation = 4 + normalizedDur * 8;
  const startRot = rotation;
  const startTime = performance.now();

  function animateSpin(now) {
    const t = Math.min((now - startTime) / spinDuration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    rotation = startRot + totalRotation * ease * Math.PI * 2;
    drawWheel(rotation);
    if (t < 1) {
      spinAnim = requestAnimationFrame(animateSpin);
    } else {
      setTimeout(() => showQuote(colorIdx, durLevel), 300);
    }
  }
  spinAnim = requestAnimationFrame(animateSpin);
}

// Darker shade helper for 3D extrusion sides
function darkenHex(hex, factor) {
  const r = Math.round(parseInt(hex.slice(1,3),16) * factor);
  const g = Math.round(parseInt(hex.slice(3,5),16) * factor);
  const b = Math.round(parseInt(hex.slice(5,7),16) * factor);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}
function lightenHex(hex, factor) {
  const r = Math.min(255, Math.round(parseInt(hex.slice(1,3),16) * factor + 255 * (factor - 1)));
  const g = Math.min(255, Math.round(parseInt(hex.slice(3,5),16) * factor + 255 * (factor - 1)));
  const b = Math.min(255, Math.round(parseInt(hex.slice(5,7),16) * factor + 255 * (factor - 1)));
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function showQuote(colorIdx, durLevel) {
  const quoteText = quotes[colorIdx][durLevel];
  const color = VIBGYOR_BRIGHT[colorIdx];
  const card = document.getElementById('quoteCard');
  const qt = document.getElementById('quoteText');

  // Map colorIdx * 3 + durLevel → unique event index (0..20)
  const eventIdx = colorIdx * 3 + durLevel;
  const evt = todayEvents[eventIdx % todayEvents.length];

  // Set card glow
  card.style.setProperty('--glow-color', color + '35');

  // Set 3D text extrusion colors for the entire quote in pressed color
  qt.style.setProperty('--text-front', color);
  qt.style.setProperty('--text-top', lightenHex(color, 1.4));
  qt.style.setProperty('--text-side-r', darkenHex(color, 0.35));

  // Icon
  document.getElementById('quoteIcon').textContent = colorIcons[colorIdx];

  // Build first-word with dynamic 3D color vars
  const fwFront = color;
  const fwSide = darkenHex(color, 0.35);
  const fwTop = lightenHex(color, 1.4);
  const fwGlow = color + '80';

  const words = quoteText.split(' ');
  const firstWord = words.shift();
  const rest = words.join(' ');
  const fwStyle = '--fw-front:' + fwFront +
    ';--fw-side:' + fwSide +
    ';--fw-top:' + fwTop +
    ';--fw-glow:' + fwGlow;

  qt.innerHTML =
    '\u201c<span class="first-word" style="' + fwStyle + '">' + firstWord + '</span> ' + rest + '\u201d';

  // History event
  document.getElementById('historyText').innerHTML =
    '<span class="history-year">' + evt.y + '</span> \u2014 ' + evt.t;

  document.getElementById('overlay').classList.add('show');
}

document.getElementById('btnClose').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  hint.textContent = 'Press & hold any color on the wheel!';
  idleSpin();
});

// Touch events
container.addEventListener('touchstart', onPressStart, { passive: true });
container.addEventListener('touchend', onPressEnd);
container.addEventListener('touchcancel', onPressEnd);

// Mouse fallback
container.addEventListener('mousedown', onPressStart);
window.addEventListener('mouseup', onPressEnd);

// ── Inline Service Worker for PWA ──
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}
</script>
